<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID.SCENT | Y2K</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Mono', monospace;
            background-color: #050505;
            /* Y2K Grid Background */
            background-image: 
                linear-gradient(rgba(0, 255, 100, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 100, 0.05) 1px, transparent 1px),
                radial-gradient(circle at center, #111 0%, #000 100%);
            background-size: 50px 50px, 50px 50px, 100% 100%;
            color: #e0e0e0;
            overflow-x: hidden;
            padding: 0 0 100px;
        }

        /* Moving Scanline */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: rgba(0, 255, 100, 0.1);
            opacity: 0.4;
            z-index: 10;
            pointer-events: none;
            animation: scanline 6s linear infinite;
        }

        @keyframes scanline {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        .brand {
            text-align: center;
            margin: 80px 0 60px;
        }

        .brand-name {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(28px, 6vw, 52px);
            letter-spacing: 0.3em;
            font-weight: 700;
            /* Green & Silver Gradient */
            background: linear-gradient(to bottom, #00ff66 0%, #ffffff 45%, #a0a0a0 55%, #00ff66 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 255, 100, 0.3));
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 0 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #333;
            backdrop-filter: blur(5px);
            transition: all 0.4s ease;
        }

        .card:hover {
            border-color: #00ff66;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.2);
            transform: translateY(-5px);
        }

        .img-wrap {
            aspect-ratio: 1/1;
            width: 100%;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) brightness(0.8);
            transition: 0.5s ease;
        }

        .card:hover img {
            filter: grayscale(0) brightness(1);
            transform: scale(1.05);
        }

        .info {
            padding: 20px;
            border-top: 1px solid #222;
            background: rgba(10, 10, 10, 0.9);
        }

        /* Silver Text Styling */
        .name {
            font-family: 'Syncopate', sans-serif;
            font-size: 12px;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            color: #e0e0e0; /* Silver */
            text-transform: uppercase;
        }

        .price {
            font-size: 14px;
            color: #b0b0b0; /* Light Silver */
            font-weight: bold;
        }

        .card::before {
            content: "SECURED_UNIT";
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 8px;
            color: #00ff66;
            z-index: 5;
        }

        @media (max-width: 600px) {
            .grid { padding: 0 20px; }
            .brand-name { letter-spacing: 0.1em; }
        }
    </style>
</head>
<body>

<div class="brand">
    <div class="brand-name">VOID.SCENT</div>
</div>

<div class="grid" id="grid"></div>

<script>
    const products = [
        { name: 'Chrome Logic', price: 210, img: 'https://images.unsplash.com/photo-1541643600914-78b084683601?w=600&q=80' },
        { name: 'Silver Aura', price: 260, img: 'https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=600&q=80' },
        { name: 'Emerald Bloom', price: 220, img: 'https://images.unsplash.com/photo-1594035910387-fea47794261f?w=600&q=80' },
        { name: 'Static Void', price: 295, img: 'https://images.unsplash.com/photo-1512777576244-b846ac3d816f?w=600&q=80' },
        { name: 'Liquid Chrome', price: 300, img: 'https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=600&q=80' },
        { name: 'Noir Essence', price: 240, img: 'https://images.unsplash.com/photo-1557170334-a9632e77c6e4?w=600&q=80' }
    ];

    function render() {
        const grid = document.getElementById('grid');
        // Render with Silver text classes
        grid.innerHTML = products.map(p => `
            <div class="card">
                <div class="img-wrap">
                    <img src="${p.img}" alt="${p.name}">
                </div>
                <div class="info">
                    <div class="name">${p.name}</div>
                    <div class="price">$${p.price}.00</div>
                </div>
            </div>
        `).join('');
    }

    render();
</script>

</body>
</html>
